name: "Update Go Dependencies"
on:
  workflow_dispatch:
  schedule:
    # Every Monday at 00:00 UTC
    - cron: "0 0 * * 1"

permissions:
  contents: read

jobs:
  update-deps:
    if: ${{ github.repository == 'aws/eks-node-monitoring-agent' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
      id-token: write
    outputs:
      pr_number: ${{ steps.create_pr.outputs.pull-request-number }}
      latest_k8s: ${{ steps.k8s_version.outputs.latest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CI }}
      - name: Get latest k8s version
        id: k8s_version
        run: |
          LATEST=$(aws eks describe-cluster-versions | jq -r '.clusterVersions | map(.clusterVersion) | sort_by(split(".") | map(tonumber)) | last')
          echo "latest=${LATEST}" >> $GITHUB_OUTPUT
      - name: Update dependencies
        id: update_deps
        run: |
          go get $(go list -f '{{if not (or .Main .Indirect)}}{{.Path}}{{end}}' -mod=mod -m all)
          go mod tidy
          make generate
          echo 'changes<<EOF' >> $GITHUB_OUTPUT
          git status --porcelain >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
      - name: Create PR
        id: create_pr
        if: ${{ steps.update_deps.outputs.changes != '' }}
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          title: "chore: update go dependencies"
          commit-message: "chore: update go dependencies"
          branch: dependencies/update-go-mod
          base: main
          delete-branch: true
          body: |
            Automated weekly update of go.mod dependencies.

  trigger-e2e:
    needs: update-deps
    if: ${{ needs.update-deps.outputs.pr_number != '' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: read
    steps:
      - name: Dispatch e2e tests
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          PR_NUMBER: ${{ needs.update-deps.outputs.pr_number }}
          K8S_VERSION: ${{ needs.update-deps.outputs.latest_k8s }}
        with:
          script: |
            const crypto = require('crypto');
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const k8sVersion = process.env.K8S_VERSION;
            let sha = null;
            for (let i = 0; i < 5; i++) {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              sha = pr.data.merge_commit_sha;
              if (sha) break;
              await new Promise(r => setTimeout(r, 3000));
            }
            if (!sha) throw new Error('Could not get merge commit SHA');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci-manual.yaml',
              ref: 'main',
              inputs: {
                uuid: crypto.randomUUID(),
                pr_number: String(prNumber),
                git_sha: sha,
                requester: 'github-actions[bot]',
                comment_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${prNumber}`,
                k8s_versions: k8sVersion
              }
            });
